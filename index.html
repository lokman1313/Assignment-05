<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-05 || LOGIN</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="from pt-10 ">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl ">
            <div class=" mx-auto pt-10">
                <img src="image/github-logo.png" alt="">
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-gray-600">Sign in to manage your issues</p>
            </div>
            <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Username</label>
          <input id="input-username" maxlength="5" minlength="5" type="text" class="input bg-base-300 " placeholder="Enter Username" />
          <p class="font-bold text-primary">Default: admin</p>
          <br>
          <label class="label text-neutral font-bold">Password</label>
          <input id="input-pasword" maxlength="8" minlength="8" type="password" class="input bg-base-300" placeholder="Enter Password" />
          <p class="font-bold text-primary">Default: admin123</p>
          
          <button id="login-btn" class="btn btn-primary rounded-full mt-4 ">Login</button>
        </fieldset>
      </div>

      <div class="flex items-center my-4">
  <div class="flex-grow border-t border-gray-300"></div>
  <span class="mx-4 text-gray-500">OR</span>
  <div class="flex-grow border-t border-gray-300"></div>
  </div>
  <p class="text-center text-gray-500">Demo Credentials:</p>
  <div class="text-center bg-slate-100 rounded-lg w-[90%] mx-auto p-3 mb-6">
    <p class="text-lg font-semibold">Username: admin <br>
       Password: admin123
    </p>
  </div>
    </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
